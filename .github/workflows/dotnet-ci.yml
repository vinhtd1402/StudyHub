name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Restore
        run: dotnet restore StudyHub.slnx

      - name: Build
        run: dotnet build StudyHub.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test StudyHub.slnx --configuration Release --no-build --verbosity normal
